  const wrap = document.getElementById('canvas-wrap');

// ============================================================
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, dur, type = 'square', vol = 0.15, slide = 0) {
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) o.frequency.linearRampToValueAtTime(freq + slide, audioCtx.currentTime + dur);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

function sfxJump() { playTone(400, 0.15, 'square', 0.12, 300); }
function sfxStar() { playTone(800, 0.1, 'square', 0.1); setTimeout(() => playTone(1200, 0.15, 'square', 0.1), 80); }

// ============================================================
// SPRITE RENDERER
// ============================================================
function drawSprite(spr, x, y, scale = 1, flipX = false) {
  const pw = scale; // pixel width
  for (let row = 0; row < spr.length; row++) {
    for (let col = 0; col < spr[row].length; col++) {
      const ch = spr[row][col];
      if (ch === '_' || ch === ' ') continue;
      const color = C[ch];
      if (!color) continue;
      ctx.fillStyle = color;
      const dx = flipX ? (spr[row].length - 1 - col) * pw : col * pw;
      ctx.fillRect(Math.floor(x + dx), Math.floor(y + row * pw), pw, pw);
    }
  }
}

// ============================================================
// PARTICLE SYSTEM
// ============================================================
let particles = [];

function spawnParticles(x, y, color, count = 8, speed = 2) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed * (0.5 + Math.random()),
      vy: Math.sin(angle) * speed * (0.5 + Math.random()) - 1,
      life: 1,
      color,
      size: 2 + Math.random() * 2,
    });
  }
}

function spawnConfetti(x, y, count = 20) {
  const colors = ['#ff3333', '#ffcc00', '#44cc44', '#4a5dbd', '#ff6b7a', '#ff8800', '#fff'];
  for (let i = 0; i < count; i++) {
    particles.push({
      x: x + Math.random() * 100 - 50,
      y,
      vx: Math.random() * 4 - 2,
      vy: -Math.random() * 4 - 1,
      life: 2,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: 2 + Math.random() * 3,
      gravity: true,
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    if (p.gravity) p.vy += 0.1 * dt * 60;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.min(1, p.life * 2);
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.floor(p.x), Math.floor(p.y), Math.ceil(p.size), Math.ceil(p.size));
  }
  ctx.globalAlpha = 1;
}

let jumpPressed = false;

let leftPressed = false;
let rightPressed = false;

function onInput() {
  ensureAudio();
  jumpPressed = true;
}
function onInputUp() { jumpPressed = false; }

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') { e.preventDefault(); onInput(); }
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') { e.preventDefault(); leftPressed = true; }
  if (e.code === 'ArrowRight' || e.code === 'KeyD') { e.preventDefault(); rightPressed = true; }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') onInputUp();
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') leftPressed = false;
  if (e.code === 'ArrowRight' || e.code === 'KeyD') rightPressed = false;
});
// Multi-touch support for iPad — track all active touches
let activeTouches = {};

function classifyTouch(e, touch) {
  const rect = canvas.getBoundingClientRect();
  const tapX = (touch.clientX - rect.left) / rect.width;
  const tapY = (touch.clientY - rect.top) / rect.height;
  if (state === BOSS && tapY > 0.6) {
    if (tapX < 0.26) return 'left';
    if (tapX < 0.52) return 'right';
  }
  return 'jump';
}

function updateTouchState() {
  let l = false, r = false, j = false;
  for (const id in activeTouches) {
    const role = activeTouches[id];
    if (role === 'left') l = true;
    if (role === 'right') r = true;
    if (role === 'jump') j = true;
  }
  leftPressed = l || leftPressed; // keep keyboard state too
  rightPressed = r || rightPressed;
  if (j && !jumpPressed) onInput();
  if (!j && jumpPressed) onInputUp();
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  ensureAudio();
  for (const touch of e.changedTouches) {
    activeTouches[touch.identifier] = classifyTouch(e, touch);
  }
  updateTouchState();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    activeTouches[touch.identifier] = classifyTouch(e, touch);
  }
  updateTouchState();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    delete activeTouches[touch.identifier];
  }
  // Recalculate from remaining touches
  leftPressed = false; rightPressed = false;
  jumpPressed = false;
  for (const id in activeTouches) {
    const role = activeTouches[id];
    if (role === 'left') leftPressed = true;
    if (role === 'right') rightPressed = true;
    if (role === 'jump') jumpPressed = true;
  }
}, { passive: false });

canvas.addEventListener('touchcancel', e => {
  activeTouches = {};
  leftPressed = false; rightPressed = false;
  onInputUp();
});

// Fallback for mouse (testing on desktop)
canvas.addEventListener('pointerdown', e => {
  if (e.pointerType === 'touch') return; // handled by touch events
  e.preventDefault();
  onInput();
});
canvas.addEventListener('pointerup', e => {
  if (e.pointerType === 'touch') return;
  e.preventDefault();
  onInputUp();
});

// ============================================================

function updateLevelPanel() {

    btn.classList.toggle('active', parseInt(btn.dataset.level) === currentLevel);
  });
}

function startLevel(n) {

  buildLevel(n);
  camX = 0;
  gameTime = 0;
  state = (n === 3) ? BOSS : PLAYING;
  updateLevelPanel();
}

function startGame() {
  totalStars = 0;
  rescuedFriends = [];
  startLevel(0);
}

// Level panel click handlers
document.querySelectorAll('.level-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    ensureAudio();
    const lvl = parseInt(btn.dataset.level);
    totalStars = 0;
    rescuedFriends = [];
    startLevel(lvl);
  });

// Physics constants
const GRAVITY = 600;
const JUMP_VEL = -210;
const JUMP_HOLD_TIME = 0.2;
const COYOTE_TIME = 0.08;
const MAX_FALL = 400;

function updatePlayer(dt) {
  const p = player;

  // Boss level: manual left/right control, no auto-run
  if (state === BOSS) {
    p.vx = 0;
    if (leftPressed) p.vx = -p.runSpeed;
    if (rightPressed) p.vx = p.runSpeed;
    // Clamp to arena
    if (p.x < 5) p.x = 5;
    if (p.x > levelWidth - p.w - 5) p.x = levelWidth - p.w - 5;
  } else if (p.pauseTimer > 0) {
    // Pause timer (after pit respawn, briefly stop so player can react)
    p.pauseTimer -= dt;
    p.vx = 0;
  } else {
    // Auto-run
    p.vx = p.runSpeed;
  }

  // Jump input
  jumpJustPressed = jumpPressed && !_jumpWasPressed;

  // Coyote time
  if (p.onGround) {
    p.coyoteTime = COYOTE_TIME;
  } else {
    p.coyoteTime -= dt;
  }

  // Jump start
  if (jumpJustPressed && p.coyoteTime > 0) {
    p.vy = JUMP_VEL;
    p.jumpHeld = true;
    p.jumpTime = 0;
    p.onGround = false;
    p.coyoteTime = 0;
    sfxJump();
  }

  // Variable height jump
  if (p.jumpHeld && jumpPressed) {
    p.jumpTime += dt;
    if (p.jumpTime < JUMP_HOLD_TIME) {
      p.vy = JUMP_VEL;
    } else {
      p.jumpHeld = false;
    }
  } else {
    p.jumpHeld = false;
  }

  // Gravity
  p.vy += GRAVITY * dt;
  if (p.vy > MAX_FALL) p.vy = MAX_FALL;

  // Move X
  p.x += p.vx * dt;

  // Collide X with platforms
  for (const plat of platforms) {
    if (aabb(p.x, p.y, p.w, p.h, plat.x, plat.y, plat.w, plat.h)) {
      if (p.vx > 0) p.x = plat.x - p.w;
      else p.x = plat.x + plat.w;
    }
  }

  // Move Y
  p.y += p.vy * dt;
  p.onGround = false;

  // Collide Y with platforms
  for (const plat of [...platforms, ...clouds]) {
    if (aabb(p.x, p.y, p.w, p.h, plat.x, plat.y, plat.w, plat.h)) {
      if (p.vy > 0) {
        // Only land on top
        if (p.y + p.h - p.vy * dt <= plat.y + 4) {
          p.y = plat.y - p.h;
          p.vy = 0;
          p.onGround = true;
          p.safeX = p.x;
          p.safeY = p.y;
        }
      } else if (p.vy < 0 && plat.type === 'ground') {
        p.y = plat.y + plat.h;
        p.vy = 0;
      }
    }
  }

  // Mushroom bounce
  for (const m of mushrooms) {
    if (aabb(p.x, p.y, p.w, p.h, m.x, m.y, m.w, m.h) && p.vy > 0) {
      p.vy = JUMP_VEL * 1.4;
      m.bounce = 0.3;
      sfxJump();
      spawnParticles(m.x + 5, m.y, '#ff6666', 4, 1.5);
    }
  }

  // Pit respawn
  if (p.y > H + 20) {
    p.x = p.safeX;
    p.y = p.safeY;
    p.vy = 0;
    p.vx = 0;
    p.pauseTimer = 0.5; // brief pause so player can react before auto-run resumes
    sfxHurt();
    screenShake(3, 0.2);
    spawnParticles(p.x + 7, p.y + 7, '#ffffff', 6, 2);
  }

  // Star collection
  for (const s of stars) {
    if (!s.collected && aabb(p.x, p.y, p.w, p.h, s.x, s.y, 8, 8)) {
      s.collected = true;
      levelStars++;
      totalStars++;
      sfxStar();
      spawnParticles(s.x + 4, s.y + 4, '#ffd700', 6, 2);
    }
  }

  // Robot interaction
  for (const r of robots) {
    if (r.ko) continue;
    if (aabb(p.x, p.y, p.w, p.h, r.x, r.y, r.w, r.h)) {
      if (p.vy > 0 && p.y + p.h - p.vy * dt < r.y + 4) {
        // Bop from above
        r.ko = true;
        r.koTimer = 2;
        r.vy = -100;
        p.vy = JUMP_VEL * 0.7;
        sfxBop();
        screenShake(2, 0.15);
        spawnParticles(r.x + 6, r.y + 6, '#ffcc00', 8, 2);
      } else if (p.invincible <= 0) {
        // Hit by robot — bounce back
        p.x -= 30;
        p.vy = -120;
        p.invincible = 1;
        sfxHurt();
        screenShake(4, 0.3);
      }
    }
  }

  // Cage interaction
  if (cage && !cage.opened && aabb(p.x, p.y, p.w, p.h, cage.x, cage.y, cage.w * 2, cage.h * 2)) {
    if (state === BOSS && !boss.defeated) return; // can't open cage until boss is defeated
    cage.opened = true;
    cage.timer = 0;
    sfxRescue();
    spawnParticles(cage.x + 10, cage.y + 7, '#ffd700', 15, 3);
    screenShake(3, 0.3);
    p.runSpeed = 0; // stop
  }

  // Invincibility timer
  if (p.invincible > 0) p.invincible -= dt;

  // Animation
  p.frameTimer += dt;
  if (p.frameTimer > 0.15) { p.frameTimer = 0; p.frame = (p.frame + 1) % 2; }

  _jumpWasPressed = jumpPressed;
}

function updateRobots(dt) {
  for (const r of robots) {
    if (r.ko) {
      r.koTimer -= dt;
      r.vy += 200 * dt;
      r.y += r.vy * dt;
      if (r.koTimer <= 0) {
        // Respawn off-screen (remove effectively)
        r.x = -100; r.y = -100;
      }
      continue;
    }
    r.x += r.speed * r.dir * dt;
    if (r.x > r.startX + r.patrol || r.x < r.startX - r.patrol) r.dir *= -1;
  }
}

function updateClouds(dt) {
  for (const c of clouds) {
    c.x += c.speed * c.dir * dt;
    if (c.x > c.startX + c.range || c.x < c.startX - c.range) c.dir *= -1;
  }
}

function updateMushrooms(dt) {
  for (const m of mushrooms) {
    if (m.bounce > 0) m.bounce -= dt;
  }
}

function updateCage(dt) {
  if (!cage || !cage.opened) return;
  cage.timer += dt;
  if (cage.timer > 2.5) {
    if (state === BOSS) {
      // Victory!
      rescuedFriends.push(friendType);
      state = VICTORY;
      sfxVictory();
      spawnConfetti(W / 2, H / 2, 50);
    } else {
      rescuedFriends.push(friendType);
      state = LEVEL_COMPLETE;
      sfxVictory();
      spawnConfetti(W / 2, H / 3, 30);
    }
  }
}

// Boss logic
function updateBoss(dt) {
  if (boss.defeated) {
    boss.defeatTimer += dt;
    // Pieces fly off
    for (const piece of boss.pieces) {
      piece.x += piece.vx * dt;
      piece.y += piece.vy * dt;
      piece.vy += 200 * dt;
      piece.rot += piece.vr * dt;
    }
    return;
  }

  // Boss moves back and forth
  boss.x += boss.vx * dt;
  if (boss.x < 100 || boss.x > 650) boss.vx *= -1;

  // Boss gravity
  boss.vy += GRAVITY * 0.5 * dt;
  boss.y += boss.vy * dt;
  boss.onGround = false;
  for (const plat of platforms) {
    if (aabb(boss.x, boss.y, boss.w, boss.h, plat.x, plat.y, plat.w, plat.h)) {
      if (boss.vy > 0) {
        boss.y = plat.y - boss.h;
        boss.vy = 0;
        boss.onGround = true;
      }
    }
  }

  // Boss jump occasionally
  boss.timer += dt;
  if (boss.timer > 2 && boss.onGround) {
    boss.vy = -180;
    boss.timer = 0;
  }

  // Hit timer
  if (boss.hitTimer > 0) boss.hitTimer -= dt;

  // Player bop boss
  const p = player;
  if (aabb(p.x, p.y, p.w, p.h, boss.x, boss.y, boss.w, boss.h)) {
    if (p.vy > 0 && p.y + p.h - p.vy * dt < boss.y + 4 && boss.hitTimer <= 0) {
      boss.hp--;
      boss.hitTimer = 1;
      p.vy = JUMP_VEL * 0.8;
      sfxBossHit();
      screenShake(5, 0.4);
      spawnParticles(boss.x + 10, boss.y + 5, '#ffcc00', 12, 3);

      // Spawn a piece flying off
      boss.pieces.push({
        x: boss.x + 10, y: boss.y + 5,
        vx: (Math.random() - 0.5) * 200,
        vy: -150 - Math.random() * 100,
        rot: 0, vr: (Math.random() - 0.5) * 10,
        type: 3 - boss.hp, // which piece
      });

      if (boss.hp <= 0) {
        boss.defeated = true;
        boss.defeatTimer = 0;
        // More pieces
        for (let i = 0; i < 5; i++) {
          boss.pieces.push({
            x: boss.x + Math.random() * 20, y: boss.y + Math.random() * 20,
            vx: (Math.random() - 0.5) * 300,
            vy: -200 - Math.random() * 150,
            rot: 0, vr: (Math.random() - 0.5) * 15,
            type: i,
          });
        }
        spawnConfetti(boss.x + 10, boss.y, 30);
        sfxVictory();
        player.runSpeed = 0;
        // Open the cage after delay
        setTimeout(() => {
          if (cage) { cage.opened = true; cage.timer = 0; sfxRescue(); }
        }, 1500);
      }
    } else if (p.invincible <= 0 && boss.hitTimer <= 0) {
      // Hit by boss
      p.x -= 40;
      p.vy = -150;
      p.invincible = 1.5;
      sfxHurt();
      screenShake(4, 0.3);
    }
  }
}

function aabb(x1, y1, w1, h1, x2, y2, w2, h2) {
  return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
}

// ============================================================
// CAMERA
// ============================================================
function updateCamera() {
  const targetX = player.x - W * 0.3;
  camX += (targetX - camX) * 0.1;
  if (camX < 0) camX = 0;
  if (camX > levelWidth - W) camX = levelWidth - W;
}

// ============================================================
// RENDERING
// ============================================================

function drawBackground(bg) {
  // Sky
  ctx.fillStyle = bg.sky;
  ctx.fillRect(0, 0, W, H);

  // Parallax hills (layer 1 - far)
  ctx.fillStyle = bg.hillsDark;
  for (let i = -1; i < W / 80 + 2; i++) {
    const hx = (i * 80 - (camX * 0.2) % 80);
    drawHill(hx, GROUND_Y, 80, 50);
  }

  // Hills (layer 2 - near)
  ctx.fillStyle = bg.hills;
  for (let i = -1; i < W / 60 + 2; i++) {
    const hx = (i * 60 - (camX * 0.4) % 60);
    drawHill(hx + 20, GROUND_Y, 60, 30);
  }

  // Decorative clouds for sky level
  if (currentLevel === 2) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    for (let i = 0; i < 8; i++) {
      const cx = (i * 120 + 30 - (camX * 0.15) % 960 + 960) % (960) - 120;
      ctx.fillRect(cx, 30 + i * 15 % 50, 60, 12);
      ctx.fillRect(cx + 10, 22 + i * 15 % 50, 40, 12);
    }
  }

  // Cave crystals for cave level
  if (currentLevel === 1) {
    for (let i = 0; i < 12; i++) {
      const cx = (i * 100 + 50 - (camX * 0.3) % 1200 + 1200) % 1200 - 100;
      ctx.fillStyle = i % 3 === 0 ? '#8844cc55' : i % 3 === 1 ? '#44cccc55' : '#cc448855';
      drawCrystal(cx, 20 + (i * 37) % 60, 8 + (i * 13) % 12);
    }
  }

  // Castle bricks for boss level
  if (currentLevel === 3) {
    ctx.fillStyle = '#44444480';
    for (let row = 0; row < 8; row++) {
      for (let col = 0; col < 20; col++) {
        const bx = col * 30 + (row % 2) * 15 - (camX * 0.1) % 30;
        ctx.fillRect(bx, row * 28, 28, 26);
      }
    }
  }
}

function drawHill(x, baseY, w, h) {
  ctx.beginPath();
  ctx.moveTo(x, baseY);
  ctx.quadraticCurveTo(x + w / 2, baseY - h, x + w, baseY);
  ctx.fill();
}

function drawCrystal(x, y, h) {
  ctx.beginPath();
  ctx.moveTo(x, y + h);
  ctx.lineTo(x + 4, y);
  ctx.lineTo(x + 8, y + h);
  ctx.fill();
}

function drawGround(bg) {
  for (const plat of platforms) {
    if (plat.type === 'ground') {
      const px = plat.x - camX;
      ctx.fillStyle = bg.ground;
      ctx.fillRect(px, plat.y, plat.w, plat.h);
      // Top edge
      ctx.fillStyle = bg.groundDark;
      ctx.fillRect(px, plat.y, plat.w, 3);
      // Grass tufts for meadow
      if (currentLevel === 0) {
        ctx.fillStyle = '#6ab04c';
        for (let i = 0; i < plat.w; i += 8) {
          ctx.fillRect(px + i, plat.y - 2, 3, 3);
        }
      }
    } else {
      const px = plat.x - camX;
      ctx.fillStyle = currentLevel === 1 ? '#6a5a8e' : currentLevel === 3 ? '#666' : '#8B7355';
      ctx.fillRect(px, plat.y, plat.w, plat.h);
      ctx.fillStyle = currentLevel === 1 ? '#7a6a9e' : currentLevel === 3 ? '#777' : '#9B8365';
      ctx.fillRect(px, plat.y, plat.w, 3);
    }
  }
}

function drawClouds() {
  for (const c of clouds) {
    const px = c.x - camX;
    ctx.fillStyle = '#fff';
    ctx.fillRect(px, c.y, c.w, c.h);
    ctx.fillRect(px + 5, c.y - 4, c.w - 10, 4);
    ctx.fillStyle = '#eee';
    ctx.fillRect(px, c.y + c.h - 2, c.w, 2);
  }
}

function drawStars() {
  for (const s of stars) {
    if (s.collected) continue;
    const px = s.x - camX;
    s.sparkle += 0.05;
    const scale = 1 + Math.sin(s.sparkle * 5) * 0.1;
    drawSprite(sprStar, px, s.y, 1);
    // Sparkle effect
    if (Math.sin(s.sparkle * 8) > 0.7) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(px + 3, s.y - 1, 2, 2);
    }
  }
}

function drawRobots() {
  for (const r of robots) {
    if (r.x < -100) continue;
    const px = r.x - camX;
    if (r.ko) {
      // Draw spinning
      ctx.save();
      ctx.translate(px + 6, r.y + 6);
      ctx.rotate(r.koTimer * 10);
      drawSprite(sprRobotKO, -6, -6, 1);
      ctx.restore();
    } else {
      drawSprite(sprRobot, px, r.y, 1, r.dir < 0);
    }
  }
}

function drawMushrooms() {
  for (const m of mushrooms) {
    const px = m.x - camX;
    const squish = m.bounce > 0 ? Math.sin(m.bounce * 20) * 2 : 0;
    drawSprite(sprMushroom, px, m.y + squish, 1);
  }
}

function drawPlayer() {
  const p = player;
  const px = p.x - camX;

  // Blink when invincible
  if (p.invincible > 0 && Math.sin(p.invincible * 30) > 0) return;

  const spr = p.onGround ? sprRabbit : sprRabbitJump;
  drawSprite(spr, px, p.y, 1);

  // Running dust particles
  if (p.onGround && p.runSpeed > 0 && p.frame === 0) {
    spawnParticles(px + 2, p.y + 13, '#ccc', 1, 0.5);
  }
}

function drawCage() {
  if (!cage) return;
  const px = cage.x - camX;

  if (cage.opened) {
    // Draw freed friend
    const bounce = Math.sin(cage.timer * 5) * 5;
    drawSprite(friendType, px + 2, cage.y + 4 - Math.abs(bounce), 1);
    // Hearts
    if (cage.timer > 0.5) {
      drawSprite(sprHeart, px - 5, cage.y - 10 + Math.sin(cage.timer * 3) * 3, 1);
      drawSprite(sprHeart, px + 20, cage.y - 8 + Math.sin(cage.timer * 3 + 1) * 3, 1);
    }
  } else {
    // Draw cage with friend inside
    drawSprite(friendType, px + 2, cage.y + 4, 1);
    drawSprite(sprCage, px - 2, cage.y - 2, 1);
  }
}

function drawBoss() {
  if (state !== BOSS && !(state === PLAYING && currentLevel === 3)) return;
  if (boss.defeated && boss.defeatTimer > 1) {
    // Draw defeated viking — just the orange face, spiral eyes, no suit
    const px = boss.x - camX;
    const bounce = Math.sin(boss.defeatTimer * 4) * 3;
    ctx.fillStyle = '#ff8800'; // orange face
    ctx.fillRect(px + 3, boss.y + 10 + bounce, 12, 10);
    ctx.fillStyle = '#222';
    ctx.fillRect(px + 2, boss.y + 9 + bounce, 14, 1); // outline top
    ctx.fillRect(px + 2, boss.y + 20 + bounce, 14, 1); // outline bottom
    // Spiral eyes (magenta)
    ctx.fillStyle = '#ff44ff';
    ctx.fillRect(px + 5, boss.y + 13 + bounce, 3, 3);
    ctx.fillRect(px + 11, boss.y + 13 + bounce, 3, 3);
    ctx.fillStyle = '#222';
    ctx.fillRect(px + 6, boss.y + 14 + bounce, 1, 1);
    ctx.fillRect(px + 12, boss.y + 14 + bounce, 1, 1);
    // Wavy mouth
    ctx.fillStyle = '#222';
    ctx.fillRect(px + 6, boss.y + 18 + bounce, 6, 1);
    // Speech bubble
    if (boss.defeatTimer > 2) {
      drawSpeechBubble(px + 10, boss.y + bounce, "Oh no!");
    }
  } else if (!boss.defeated) {
    const px = boss.x - camX;
    // Flash when hit
    if (boss.hitTimer > 0.7) {
      ctx.globalAlpha = 0.5 + Math.sin(boss.hitTimer * 40) * 0.5;
    }
    drawSprite(sprViking, px, boss.y, 1);
    ctx.globalAlpha = 1;

    // HP bar
    const barW = 40;
    const barH = 4;
    const barX = px;
    const barY = boss.y - 10;
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = '#ff3333';
    ctx.fillRect(barX, barY, barW * (boss.hp / boss.maxHp), barH);
  }

  // Draw pieces flying off
  for (const piece of boss.pieces) {
    ctx.save();
    ctx.translate(piece.x - camX, piece.y);
    ctx.rotate(piece.rot);
    ctx.fillStyle = piece.type < 3 ? '#888' : '#4a5dbd';
    ctx.fillRect(-4, -4, 8, 8);
    ctx.restore();
  }
}

function drawSpeechBubble(x, y, text) {
  ctx.fillStyle = '#fff';
  const tw = text.length * 5 + 8;
  ctx.fillRect(x - tw / 2, y - 18, tw, 14);
  // Triangle
  ctx.beginPath();
  ctx.moveTo(x - 3, y - 4);
  ctx.lineTo(x + 3, y - 4);
  ctx.lineTo(x, y);
  ctx.fill();
  ctx.fillStyle = '#333';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(text, x, y - 8);
}

function drawTutorialArrows(dt) {
  for (const a of tutorialArrows) {
    a.timer += dt;
    if (a.timer > 5) continue; // fade out
    const px = a.x - camX;
    if (px < -20 || px > W + 20) continue;
    const bob = Math.sin(a.timer * 4) * 5;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(a.text, px, a.y + bob);
    // Arrow pointing down
    ctx.beginPath();
    ctx.moveTo(px - 5, a.y + bob + 5);
    ctx.lineTo(px + 5, a.y + bob + 5);
    ctx.lineTo(px, a.y + bob + 12);
    ctx.fill();
  }
}

function drawHUD() {
  // Star count
  drawSprite(sprStar, 8, 8, 1);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('x ' + totalStars, 18, 17);

  // Level name
  const names = ['Green Meadow', 'Crystal Cave', 'Sky Bridge', "Viking's Castle"];
  ctx.font = '8px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(names[currentLevel], W - 8, 14);
}

function drawBossControls() {
  // Large on-screen buttons sized for iPad touch
  const btnW = W * 0.24;
  const btnH = H * 0.35;
  const btnY = H - btnH - 4;
  const gap = 8;
  const alpha = 0.3;
  const r = 6; // corner radius

  // Left button
  ctx.fillStyle = leftPressed ? 'rgba(255,255,255,0.5)' : `rgba(255,255,255,${alpha})`;
  roundRect(4, btnY, btnW, btnH, r);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('◀', 4 + btnW / 2, btnY + btnH / 2 + 10);

  // Right button
  ctx.fillStyle = rightPressed ? 'rgba(255,255,255,0.5)' : `rgba(255,255,255,${alpha})`;
  roundRect(4 + btnW + gap, btnY, btnW, btnH, r);
  ctx.fillStyle = '#fff';
  ctx.fillText('▶', 4 + btnW + gap + btnW / 2, btnY + btnH / 2 + 10);

  // Jump button (big, bottom-right)
  const jbtnW = btnW * 1.3;
  ctx.fillStyle = jumpPressed ? 'rgba(255,215,0,0.55)' : 'rgba(255,215,0,0.3)';
  roundRect(W - jbtnW - 4, btnY, jbtnW, btnH, r);
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('JUMP', W - jbtnW / 2 - 4, btnY + btnH / 2 + 6);
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.fill();
}

// ============================================================
// TITLE SCREEN
// ============================================================
let titleTimer = 0;

function drawTitleScreen(dt) {
  titleTimer += dt;

  // Background
  ctx.fillStyle = '#1a0a3e';
  ctx.fillRect(0, 0, W, H);

  // Stars in background
  for (let i = 0; i < 30; i++) {
    const sx = (i * 47 + titleTimer * 10) % W;
    const sy = (i * 31) % (H - 50);
    ctx.fillStyle = Math.sin(titleTimer * 2 + i) > 0.5 ? '#ffd700' : '#fff';
    ctx.fillRect(sx, sy, 2, 2);
  }

  // Ground
  ctx.fillStyle = '#4a8c3f';
  ctx.fillRect(0, H - 40, W, 40);
  ctx.fillStyle = '#6ab04c';
  for (let i = 0; i < W; i += 8) ctx.fillRect(i, H - 42, 3, 3);

  // Title text
  const titleY = 40 + Math.sin(titleTimer * 2) * 5;
  ctx.textAlign = 'center';

  // Shadow
  ctx.fillStyle = '#ff3333';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('SUPER RABBIT BOY', W / 2 + 2, titleY + 2);
  // Main
  ctx.fillStyle = '#ffd700';
  ctx.fillText('SUPER RABBIT BOY', W / 2, titleY);

  // Subtitle
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('Save Animal Town!', W / 2, titleY + 28);

  // Rabbit Boy on the ground
  const rbX = W / 2 - 7;
  const rbY = H - 56;
  const rbBounce = Math.abs(Math.sin(titleTimer * 3)) * 5;
  drawSprite(sprRabbit, rbX, rbY - rbBounce, 1);

  // Animal friends on the sides
  drawSprite(sprBunny, 60 + Math.sin(titleTimer * 2) * 3, H - 52, 1);
  drawSprite(sprFox, 140, H - 52 + Math.sin(titleTimer * 2.2) * 3, 1);
  drawSprite(sprBear, W - 170, H - 52 + Math.sin(titleTimer * 1.8) * 3, 1);
  drawSprite(sprCat, W - 80 + Math.sin(titleTimer * 2.5) * 3, H - 52, 1);

  // King Viking lurking
  drawSprite(sprViking, W - 50, H - 60 + Math.sin(titleTimer * 1.5) * 2, 1);

  // "TAP TO START" blinking
  if (Math.sin(titleTimer * 4) > 0) {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('TAP TO START', W / 2, H - 10);
  }
}

// ============================================================
// LEVEL COMPLETE SCREEN
// ============================================================
let lcTimer = 0;

function drawLevelComplete(dt) {
  lcTimer += dt;

  // Darken
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  // "LEVEL COMPLETE!"
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('LEVEL COMPLETE!', W / 2, 60);

  // Stars
  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.fillText('Stars: ' + levelStars, W / 2, 95);

  // Rescued friend
  const friendNames = ['Bunny', 'Fox', 'Bear', 'Cat'];
  ctx.fillStyle = '#88ee88';
  ctx.font = 'bold 12px monospace';
  ctx.fillText(friendNames[currentLevel] + ' Rescued!', W / 2, 125);

  // Draw friend bouncing
  const bounce = Math.sin(lcTimer * 4) * 8;
  drawSprite(friendType, W / 2 - 6, 140 - Math.abs(bounce), 1);

  // Hearts
  if (lcTimer > 1) {
    drawSprite(sprHeart, W / 2 - 20, 135 + Math.sin(lcTimer * 3) * 3, 1);
    drawSprite(sprHeart, W / 2 + 14, 135 + Math.sin(lcTimer * 3 + 1) * 3, 1);
  }

  // Continue prompt
  if (lcTimer > 2 && Math.sin(lcTimer * 4) > 0) {
    ctx.fillStyle = '#fff';
    ctx.font = '10px monospace';
    ctx.fillText('TAP TO CONTINUE', W / 2, 220);
  }

  spawnConfetti(W / 2, 50, 1);
}

// ============================================================
// VICTORY SCREEN
// ============================================================
let victoryTimer = 0;

function drawVictoryScreen(dt) {
  victoryTimer += dt;

  // Rainbow background
  const hue = (victoryTimer * 30) % 360;
  ctx.fillStyle = `hsl(${hue}, 30%, 15%)`;
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  // Rainbow text
  const text = 'YOU WIN!';
  ctx.font = 'bold 32px monospace';
  for (let i = 0; i < text.length; i++) {
    const h = ((i / text.length) * 360 + victoryTimer * 100) % 360;
    ctx.fillStyle = `hsl(${h}, 100%, 60%)`;
    ctx.fillText(text[i], W / 2 - 90 + i * 26, 55 + Math.sin(victoryTimer * 3 + i * 0.5) * 5);
  }

  ctx.fillStyle = '#fff';
  ctx.font = '12px monospace';
  ctx.fillText('Animal Town is saved!', W / 2, 85);

  ctx.fillStyle = '#ffd700';
  ctx.font = '10px monospace';
  ctx.fillText('Total Stars: ' + totalStars, W / 2, 105);

  // All friends dancing
  const friends = [sprBunny, sprFox, sprBear, sprCat];
  const friendNames = ['Bunny', 'Fox', 'Bear', 'Cat'];
  for (let i = 0; i < 4; i++) {
    const fx = W / 2 - 90 + i * 55;
    const fy = 145 + Math.sin(victoryTimer * 4 + i * 1.5) * 8;
    drawSprite(friends[i], fx, fy, 1);
    ctx.fillStyle = '#fff';
    ctx.font = '7px monospace';
    ctx.fillText(friendNames[i], fx + 6, fy + 20);
  }

  // Rabbit Boy in center
  const rbBounce = Math.abs(Math.sin(victoryTimer * 5)) * 10;
  drawSprite(sprRabbitJump, W / 2 - 7, 115 - rbBounce, 1);

  // King Viking defeated on the side
  const vkY = 175 + Math.sin(victoryTimer * 2) * 2;
  ctx.fillStyle = '#ff8800';
  ctx.fillRect(W - 55, vkY, 12, 10);
  ctx.fillStyle = '#ff44ff';
  ctx.fillRect(W - 53, vkY + 3, 2, 2);
  ctx.fillRect(W - 48, vkY + 3, 2, 2);
  ctx.fillStyle = '#222';
  ctx.fillRect(W - 52, vkY + 7, 6, 1);
  drawSpeechBubble(W - 49, vkY - 5, "I'll be back!");

  // Confetti
  spawnConfetti(Math.random() * W, -10, 1);

  // Play again
  if (victoryTimer > 3 && Math.sin(victoryTimer * 4) > 0) {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('TAP TO PLAY AGAIN', W / 2, H - 20);
  }
}

// ============================================================
// MAIN GAME LOOP
// ============================================================
let lastTime = 0;
let gameTime = 0;

function gameLoop(time) {
  requestAnimationFrame(gameLoop);

  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  gameTime += dt;

  // Screen shake
  let sx = 0, sy = 0;
  if (shakeDur > 0) {
    sx = (Math.random() - 0.5) * shakeAmount * 2;
    sy = (Math.random() - 0.5) * shakeAmount * 2;
    shakeDur -= dt;
  }

  ctx.save();
  ctx.translate(sx, sy);

  switch (state) {
    case TITLE:
      drawTitleScreen(dt);
      updateParticles(dt);
      drawParticles();
      if (jumpJustPressed) {
        startGame();
      }
      // Update input state for title screen
      jumpJustPressed = jumpPressed && !_jumpWasPressed;
      _jumpWasPressed = jumpPressed;
      break;

    case PLAYING:
      updatePlayer(dt);
      updateRobots(dt);
      updateClouds(dt);
      updateMushrooms(dt);
      updateCage(dt);
      updateCamera();
      updateParticles(dt);

      drawBackground(levelBGs[currentLevel]);
      drawGround(levelBGs[currentLevel]);
      drawClouds();
      drawMushrooms();
      drawStars();
      drawRobots();
      drawCage();
      drawPlayer();
      drawParticles();
      drawTutorialArrows(dt);
      drawHUD();
      break;

    case BOSS:
      updatePlayer(dt);
      updateBoss(dt);
      updateCage(dt);
      updateCamera();
      updateParticles(dt);

      drawBackground(levelBGs[currentLevel]);
      drawGround(levelBGs[currentLevel]);
      drawStars();
      drawCage();
      drawBoss();
      drawPlayer();
      drawParticles();
      drawHUD();

      // Boss intro speech
      if (gameTime < 2 && !boss.defeated) {
        drawSpeechBubble(boss.x - camX + 10, boss.y - 15, "Ha ha ha!");
      }

      // On-screen touch controls
      drawBossControls();

      // Control hint
      if (gameTime < 4) {
        ctx.fillStyle = '#fff';
        ctx.font = '8px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('Use arrows to move, TAP right side to jump!', W / 2, 25);
      }
      break;

    case LEVEL_COMPLETE:
      // Keep rendering level behind
      drawBackground(levelBGs[currentLevel]);
      drawGround(levelBGs[currentLevel]);
      drawClouds();
      drawMushrooms();
      drawStars();
      drawRobots();
      drawCage();
      drawPlayer();

      drawLevelComplete(dt);
      updateParticles(dt);
      drawParticles();

      jumpJustPressed = jumpPressed && !_jumpWasPressed;
      _jumpWasPressed = jumpPressed;
      if (jumpJustPressed && lcTimer > 2) {
        lcTimer = 0;
        if (currentLevel < 3) {
          startLevel(currentLevel + 1);
          gameTime = 0;
        } else {
          state = VICTORY;
          victoryTimer = 0;
        }
      }
      break;

    case VICTORY:
      drawVictoryScreen(dt);
      updateParticles(dt);
      drawParticles();

      jumpJustPressed = jumpPressed && !_jumpWasPressed;
      _jumpWasPressed = jumpPressed;
      if (jumpJustPressed && victoryTimer > 3) {
        state = TITLE;
        titleTimer = 0;
        victoryTimer = 0;
      }
      break;
  }

  ctx.restore();
}

// Start
resetPlayer(40, GROUND_Y - 16);
setTimeout(resize, 0); // re-measure after layout
requestAnimationFrame(gameLoop);

</script>
