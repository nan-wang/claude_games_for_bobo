let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, dur, type = 'square', vol = 0.12, slide = 0) {
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) o.frequency.linearRampToValueAtTime(freq + slide, audioCtx.currentTime + dur);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

// ============================================================
// SPRITE RENDERER
// ============================================================
function drawSprite(spr, x, y, scale = 1) {
  const pw = scale;
  for (let row = 0; row < spr.length; row++) {
    for (let col = 0; col < spr[row].length; col++) {
      const ch = spr[row][col];
      if (ch === '_' || ch === ' ') continue;
      const color = C[ch];
      if (!color) continue;
      ctx.fillStyle = color;
      ctx.fillRect(Math.floor(x + col * pw), Math.floor(y + row * pw), pw, pw);
    }
  }
}

// ============================================================
// PARTICLE SYSTEM
// ============================================================
let particles = [];

function spawnParticles(x, y, color, count = 8, speed = 2) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed * (0.5 + Math.random()),
      vy: Math.sin(angle) * speed * (0.5 + Math.random()),
      life: 0.6 + Math.random() * 0.4,
      color, size: 2 + Math.random() * 2,
    });
  }
}

function spawnConfetti(x, y, count = 30) {
  const colors = ['#ff3333', '#ffcc00', '#44ff44', '#4488ff', '#ff8800', '#cc44ff', '#fff'];
  for (let i = 0; i < count; i++) {
    particles.push({
      x: x + Math.random() * 200 - 100, y,
      vx: Math.random() * 4 - 2, vy: -Math.random() * 4 - 1,
      life: 2 + Math.random(),
      color: colors[Math.floor(Math.random() * colors.length)],
      size: 2 + Math.random() * 3, gravity: true,
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    if (p.gravity) p.vy += 0.1 * dt * 60;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.min(1, p.life * 2);
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.floor(p.x), Math.floor(p.y), Math.ceil(p.size), Math.ceil(p.size));
  }
  ctx.globalAlpha = 1;
}

// ============================================================

const starLayers = [[], [], []];
function initStarfield() {
  for (let layer = 0; layer < 3; layer++) {
    starLayers[layer] = [];
    const count = 30 + layer * 20;
    for (let i = 0; i < count; i++) {
      starLayers[layer].push({
        x: Math.random() * W, y: Math.random() * H,
        size: layer === 0 ? 1 : (layer === 1 ? 1 : 2),
        speed: (layer + 1) * 15,
        brightness: 0.3 + layer * 0.25,
      });
    }
  }
}
initStarfield();

function updateStarfield(dt) {
  for (let layer = 0; layer < 3; layer++) {
    for (const star of starLayers[layer]) {
      star.y += star.speed * dt;
      if (star.y > H) { star.y = -2; star.x = Math.random() * W; }
    }
  }
}

function drawStarfield() {
  for (let layer = 0; layer < 3; layer++) {
    for (const star of starLayers[layer]) {
      ctx.globalAlpha = star.brightness + Math.sin(Date.now() * 0.003 + star.x) * 0.1;
      ctx.fillStyle = '#fff';
      ctx.fillRect(Math.floor(star.x), Math.floor(star.y), star.size, star.size);
    }
  }
  ctx.globalAlpha = 1;
}

let touchActive = false;
let touchX = 0, touchY = 0;

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  ensureAudio();
  const rect = canvas.getBoundingClientRect();
  touchX = (e.clientX - rect.left) / rect.width * W;
  touchY = (e.clientY - rect.top) / rect.height * H;
  touchActive = true;

  if (state === TITLE) startMission(currentMission);
  if (state === LEVEL_COMPLETE) {
    if (currentMission < 4) { currentMission++; startMission(currentMission); }
    else state = TITLE;
    updateMissionBar();
  }
  if (state === VICTORY) state = TITLE;
});

canvas.addEventListener('pointermove', e => {
  if (!touchActive) return;
  const rect = canvas.getBoundingClientRect();
  touchX = (e.clientX - rect.left) / rect.width * W;
  touchY = (e.clientY - rect.top) / rect.height * H;
});

canvas.addEventListener('pointerup', e => { e.preventDefault(); touchActive = false; });
canvas.addEventListener('pointercancel', () => { touchActive = false; });

// Keyboard fallback
const keys = {};
document.addEventListener('keydown', e => {
  ensureAudio();
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if (state === TITLE && (e.code === 'Space' || e.code === 'Enter')) startMission(currentMission);
  if (state === LEVEL_COMPLETE && e.code === 'Space') {
    if (currentMission < 4) { currentMission++; startMission(currentMission); } else state = TITLE;
    updateMissionBar();
  }
  if (state === VICTORY && e.code === 'Space') state = TITLE;
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

function isUp() { return keys['ArrowUp'] || keys['KeyW']; }
function isDown() { return keys['ArrowDown'] || keys['KeyS']; }
function isLeft() { return keys['ArrowLeft'] || keys['KeyA']; }
function isRight() { return keys['ArrowRight'] || keys['KeyD']; }

    case 'xwing': return { ...base, w: 12, h: 12, hp: 1, maxHp: 1, speed: 35, shootRate: 4, sprite: sprXwing, score: 100 };
    case 'awing': return { ...base, w: 8, h: 10, hp: 1, maxHp: 1, speed: 55, shootRate: 5, sprite: sprAwing, score: 150, amplitude: 30 + Math.random() * 20, frequency: 1.5 + Math.random() };

}

// ============================================================
// UPDATE FUNCTIONS
// ============================================================
function update(dt) {
  gameTime += dt;
  if (state === TITLE || state === LEVEL_COMPLETE || state === VICTORY) {
    updateStarfield(dt); updateParticles(dt); return;
  }
  if (state !== PLAYING) return;
  updateStarfield(dt); updatePlayer(dt); updatePlayerBullets(dt);
  updateEnemyBullets(dt); updateEnemies(dt); updateBoss(dt);
  updatePowerups(dt); updateParticles(dt); updateWaves(dt);
  updateEncouragement(dt); checkMissionComplete();
  if (shakeDur > 0) { shakeDur -= dt; if (shakeDur <= 0) shakeAmount = 0; }
}

function updatePlayer(dt) {
  let dx = 0, dy = 0;
  if (touchActive) {
    const targetX = touchX - player.w / 2;
    const targetY = touchY - player.h / 2;
    const diffX = targetX - player.x;
    const diffY = targetY - player.y;
    const dist = Math.sqrt(diffX * diffX + diffY * diffY);
    if (dist > 3) { dx = diffX / dist; dy = diffY / dist; }
  } else {
    if (isLeft()) dx = -1; if (isRight()) dx = 1;
    if (isUp()) dy = -1; if (isDown()) dy = 1;
    if (dx && dy) { dx *= 0.707; dy *= 0.707; }
  }
  player.x += dx * player.speed * dt;
  player.y += dy * player.speed * dt;
  player.x = Math.max(0, Math.min(W - player.w, player.x));
  player.y = Math.max(20, Math.min(H - player.h - 4, player.y));
  if (player.invincible > 0) player.invincible -= dt;
  player.frameTimer += dt;
  if (player.frameTimer > 0.15) { player.frameTimer = 0; player.frame = 1 - player.frame; }
  player.shootTimer -= dt;
  if (player.shootTimer <= 0) { player.shootTimer = player.shootInterval; firePlayerWeapon(); }
}

function firePlayerWeapon() {
  const cx = player.x + player.w / 2;
  const topY = player.y;
  sfxPlayerShoot();
  if (player.weaponLevel >= 3) {
    playerBullets.push({ x: cx - 1, y: topY, w: 2, h: 6, vy: -250, vx: 0, color: '#44ff44', torpedo: false });
    playerBullets.push({ x: cx - 6, y: topY + 4, w: 2, h: 6, vy: -240, vx: -30, color: '#44ff44', torpedo: false });
    playerBullets.push({ x: cx + 4, y: topY + 4, w: 2, h: 6, vy: -240, vx: 30, color: '#44ff44', torpedo: false });
  } else if (player.weaponLevel >= 2) {
    playerBullets.push({ x: cx - 4, y: topY, w: 2, h: 6, vy: -250, vx: 0, color: '#44ff44', torpedo: false });
    playerBullets.push({ x: cx + 2, y: topY, w: 2, h: 6, vy: -250, vx: 0, color: '#44ff44', torpedo: false });
  } else {
    playerBullets.push({ x: cx - 1, y: topY, w: 2, h: 6, vy: -250, vx: 0, color: '#44ff44', torpedo: false });
  }
  if (player.torpedoes > 0 && Math.random() < 0.2) {
    player.torpedoes--;
    playerBullets.push({ x: cx - 2, y: topY, w: 4, h: 8, vy: -200, vx: 0, color: '#ffcc00', torpedo: true });
  }
}

function updatePlayerBullets(dt) {
  for (let i = playerBullets.length - 1; i >= 0; i--) {
    const b = playerBullets[i];
    b.x += b.vx * dt; b.y += b.vy * dt;
    if (b.y < -10 || b.x < -10 || b.x > W + 10) { playerBullets.splice(i, 1); continue; }
    let hit = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (e.dead) continue;
      if (aabb(b, e)) {
        e.hp--; e.hitTimer = 0.1;
        if (!b.torpedo) playerBullets.splice(i, 1);
        if (e.hp <= 0) destroyEnemy(e, j); else sfxHit();
        hit = true; break;
      }
    }
    if (hit) continue;
    if (boss && !boss.defeated && !boss.entering && aabb(b, boss)) {
      boss.hp--; boss.hitTimer = 0.1;
      if (!b.torpedo) playerBullets.splice(i, 1);
      sfxBossHit(); screenShake(2, 0.1);
      if (boss.hp <= 0) { boss.defeated = true; boss.defeatTimer = 3; sfxHyperspace(); }
      else if (boss.hp <= 10 && boss.phase < 3) { boss.phase = 3; boss.speed = 60; boss.shootRate = 0.8; showEncouragement('ALMOST THERE!'); }
      else if (boss.hp <= 20 && boss.phase < 2) { boss.phase = 2; boss.speed = 45; boss.shootRate = 1.2; showEncouragement('KEEP FIRING!'); }
    }
  }
}

function updateEnemyBullets(dt) {
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx * dt; b.y += b.vy * dt;
    if (b.y > H + 10 || b.y < -10 || b.x < -10 || b.x > W + 10) { enemyBullets.splice(i, 1); continue; }
    if (player.invincible <= 0) {
      const ph = { x: player.x + (player.w - player.hitW) / 2, y: player.y + (player.h - player.hitH) / 2, w: player.hitW, h: player.hitH };
      if (aabb(b, ph)) { enemyBullets.splice(i, 1); hitPlayer(); }
    }
  }
}

function hitPlayer() {
  player.shields--;
  player.invincible = 1.5;
  sfxShieldAbsorb(); screenShake(4, 0.2);
  spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#00cccc', 6, 2);
  if (player.shields <= 0) {
    player.shields = 3;
    player.weaponLevel = Math.max(1, player.weaponLevel - 1);
    showEncouragement('SHIELDS RECHARGED!');
    spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#44eeff', 12, 3);
  }
}

function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.dead) { enemies.splice(i, 1); waveEnemiesAlive--; continue; }
    e.time += dt; e.hitTimer = Math.max(0, e.hitTimer - dt);
    switch (e.type) {
      case 'xwing': e.y += e.speed * dt; break;
      case 'awing': e.y += e.speed * dt; e.x = e.startX + Math.sin(e.time * e.frequency) * e.amplitude; break;
      case 'ywing': e.y += e.speed * dt; break;
      case 'bwing': e.y += e.speed * dt; e.x = e.startX + Math.sin(e.time * 1.2 + e.swoopPhase) * 40; break;
    }
    e.x = Math.max(0, Math.min(W - e.w, e.x));
    if (e.y > H + 20) { enemies.splice(i, 1); waveEnemiesAlive--; continue; }
    e.shootTimer -= dt;
    if (e.shootTimer <= 0 && e.y > 10 && e.y < H - 40) {
      e.shootTimer = e.shootRate + Math.random() * 1.5;
      const dx = (player.x + player.w / 2) - (e.x + e.w / 2);
      const dy = (player.y + player.h / 2) - (e.y + e.h);
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const vx = (dx / dist) * 80 + (Math.random() - 0.5) * 24;
      const vy = (dy / dist) * 80 + 40;
      enemyBullets.push({ x: e.x + e.w / 2 - 1, y: e.y + e.h, w: 2, h: 4, vx, vy: Math.abs(vy), color: '#ff3333' });
      sfxEnemyShoot();
    }
    if (player.invincible <= 0) {
      const ph = { x: player.x + (player.w - player.hitW) / 2, y: player.y + (player.h - player.hitH) / 2, w: player.hitW, h: player.hitH };
      if (aabb(e, ph)) { hitPlayer(); e.hp -= 2; if (e.hp <= 0) destroyEnemy(e, i); }
    }
  }
}

function destroyEnemy(e, index) {
  e.dead = true; score += e.score;
  sfxExplosion(); screenShake(3, 0.15);
  spawnParticles(e.x + e.w / 2, e.y + e.h / 2, '#ff8800', 10, 3);
  spawnParticles(e.x + e.w / 2, e.y + e.h / 2, '#ffcc00', 6, 2);
  if (Math.random() < 0.15) showEncouragement(encourageMessages[Math.floor(Math.random() * encourageMessages.length)]);
  if (e.dropPowerUp || Math.random() < 0.08) dropPowerUp(e.x + e.w / 2, e.y + e.h / 2);
}

function dropPowerUp(x, y) {
  const types = ['weapon', 'torpedo', 'shield'];
  const weights = [0.5, 0.3, 0.2];
  let r = Math.random(), type = 'weapon';
  for (let i = 0; i < types.length; i++) { r -= weights[i]; if (r <= 0) { type = types[i]; break; } }
  powerups.push({ x: x - 4, y, w: 8, h: 8, type, vy: 30, time: 0 });
}

function updatePowerups(dt) {
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.y += p.vy * dt; p.time += dt;
    if (p.y > H + 10) { powerups.splice(i, 1); continue; }
    if (aabb(p, player)) {
      powerups.splice(i, 1); sfxPowerUp();
      spawnParticles(p.x + 4, p.y + 4, '#44ff44', 8, 2);
      switch (p.type) {
        case 'weapon': player.weaponLevel = Math.min(3, player.weaponLevel + 1); showEncouragement('WEAPON UPGRADE!'); break;
        case 'torpedo': player.torpedoes += 3; showEncouragement('TORPEDOES!'); break;
        case 'shield': player.shields = Math.min(player.maxShields, player.shields + 1); showEncouragement('SHIELDS UP!'); break;
      }
    }
  }
}

function updateBoss(dt) {
  if (!boss) return;
  boss.time += dt; boss.hitTimer = Math.max(0, boss.hitTimer - dt);
  boss.frameTimer = (boss.frameTimer || 0) + dt;
  if (boss.frameTimer > 0.2) { boss.frameTimer = 0; boss.frame = 1 - boss.frame; }
  if (boss.entering) {
    boss.y += 30 * dt;
    if (boss.y >= 20) { boss.entering = false; boss.y = 20; showEncouragement('THE FALCON APPEARS!'); }
    return;
  }
  if (boss.defeated) {
    boss.defeatTimer -= dt;
    boss.y -= 150 * dt * (3 - boss.defeatTimer);
    spawnParticles(boss.x + boss.w / 2, boss.y + boss.h, '#4488ff', 2, 1);
    if (boss.defeatTimer <= 0) { boss = null; state = VICTORY; sfxImperialMarch(); spawnConfetti(W / 2, H / 2, 50); }
    return;
  }
  boss.x += boss.dir * boss.speed * dt;
  if (boss.x <= 10 || boss.x >= W - boss.w - 10) boss.dir *= -1;
  boss.y = 20 + Math.sin(boss.time * 0.8) * 10;
  boss.shootTimer -= dt;
  if (boss.shootTimer <= 0) {
    boss.shootTimer = boss.shootRate;
    const cx = boss.x + boss.w / 2, by = boss.y + boss.h;
    if (boss.phase >= 3) {
      for (let a = -2; a <= 2; a++) enemyBullets.push({ x: cx - 1, y: by, w: 2, h: 4, vx: a * 25, vy: 90, color: '#ff3333' });
    } else if (boss.phase >= 2) {
      enemyBullets.push({ x: cx - 1, y: by, w: 2, h: 4, vx: 0, vy: 90, color: '#ff3333' });
      enemyBullets.push({ x: cx - 1, y: by, w: 2, h: 4, vx: -30, vy: 80, color: '#ff3333' });
      enemyBullets.push({ x: cx - 1, y: by, w: 2, h: 4, vx: 30, vy: 80, color: '#ff3333' });
    } else {
      enemyBullets.push({ x: cx - 4, y: by, w: 2, h: 4, vx: -10, vy: 80, color: '#ff3333' });
      enemyBullets.push({ x: cx + 2, y: by, w: 2, h: 4, vx: 10, vy: 80, color: '#ff3333' });
    }
    sfxEnemyShoot();
  }
  if (boss.phase >= 2) {
    boss.escortTimer -= dt;
    if (boss.escortTimer <= 0) { boss.escortTimer = 6; enemies.push(createEnemy(Math.random() < 0.5 ? 'xwing' : 'awing')); waveEnemiesAlive++; }
  }
}

function updateWaves(dt) {
  if (missionComplete || !waves || waveIndex >= waves.length) return;
  waveTimer += dt;
  const currentWave = waves[waveIndex];
  if (waveTimer < currentWave.delay) return;
  if (waveEnemiesAlive > 0) return;
  if (currentWave.boss) { createBoss(); }
  else {
    for (const group of currentWave.enemies) {
      for (let i = 0; i < group.count; i++) {
        const e = createEnemy(group.type); e.y = -20 - i * 30;
        enemies.push(e); waveEnemiesAlive++;
      }
    }
  }
  if (waveIndex > 0 && !currentWave.boss) sfxWaveComplete();
  waveIndex++; waveTimer = 0;
}

function checkMissionComplete() {
  if (missionComplete) return;
  if (waveIndex < waves.length) return;
  if (enemies.length > 0 || waveEnemiesAlive > 0 || boss) return;
  missionComplete = true;
  if (currentMission < 4) {
    state = LEVEL_COMPLETE; sfxWaveComplete(); spawnConfetti(W / 2, H / 3, 30);
  }
}

function showEncouragement(msg) { encourageText = msg; encourageTimer = 2; }
function updateEncouragement(dt) { if (encourageTimer > 0) encourageTimer -= dt; }
function aabb(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

// ============================================================
// DRAW
// ============================================================
function draw() {
  let sx = 0, sy = 0;
  if (shakeDur > 0) { sx = (Math.random() - 0.5) * shakeAmount * 2; sy = (Math.random() - 0.5) * shakeAmount * 2; }
  ctx.save(); ctx.translate(sx, sy);
  ctx.fillStyle = '#05050f'; ctx.fillRect(-5, -5, W + 10, H + 10);
  drawStarfield(); drawMissionBackground();

  if (state === TITLE) drawTitleScreen();
  else if (state === PLAYING) drawGame();
  else if (state === LEVEL_COMPLETE) { drawGame(); drawLevelComplete(); }
  else if (state === VICTORY) { drawGame(); drawVictory(); }
  ctx.restore();
}

function drawMissionBackground() {
  if (state !== PLAYING && state !== LEVEL_COMPLETE) return;
  switch (currentMission) {
    case 1:
      ctx.fillStyle = '#333'; ctx.globalAlpha = 0.3;
      for (let i = 0; i < 5; i++) {
        const ax = (i * 97 + gameTime * 10) % (W + 40) - 20;
        const ay = (i * 53 + gameTime * (8 + i * 3)) % (H + 40) - 20;
        ctx.beginPath(); ctx.arc(ax, ay, 6 + i * 3, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1; break;
    case 2:
      ctx.globalAlpha = 0.08;
      const g = ctx.createRadialGradient(W/2, H/2, 20, W/2, H/2, 200);
      g.addColorStop(0, '#cc44ff'); g.addColorStop(0.5, '#4444ff'); g.addColorStop(1, 'transparent');
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H); ctx.globalAlpha = 1; break;
    case 3:
      ctx.fillStyle = '#111122'; ctx.globalAlpha = 0.4;
      ctx.fillRect(W*0.6, 10, 80, 8); ctx.fillRect(W*0.65, 6, 40, 4);
      ctx.globalAlpha = 1; break;
    case 4:
      ctx.globalAlpha = 0.1; ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(W*0.8, H*0.3, 50, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(W*0.8-50, H*0.3); ctx.lineTo(W*0.8+50, H*0.3); ctx.stroke();
      ctx.globalAlpha = 1; break;
  }
}

function drawGame() {
  for (const p of powerups) {
    const bob = Math.sin(p.time * 4) * 2;
    let spr;
    switch (p.type) { case 'weapon': spr = sprPowerWeapon; break; case 'torpedo': spr = sprPowerTorpedo; break; case 'shield': spr = sprPowerShield; break; }
    drawSprite(spr, p.x, p.y + bob);
  }
  for (const b of enemyBullets) {
    ctx.fillStyle = b.color; ctx.fillRect(Math.floor(b.x), Math.floor(b.y), b.w, b.h);
    ctx.globalAlpha = 0.3; ctx.fillRect(Math.floor(b.x)-1, Math.floor(b.y)-1, b.w+2, b.h+2); ctx.globalAlpha = 1;
  }
  for (const b of playerBullets) {
    ctx.fillStyle = b.color; ctx.fillRect(Math.floor(b.x), Math.floor(b.y), b.w, b.h);
    ctx.globalAlpha = 0.3; ctx.fillRect(Math.floor(b.x)-1, Math.floor(b.y)-1, b.w+2, b.h+2); ctx.globalAlpha = 1;
  }
  for (const e of enemies) {
    if (e.dead) continue;
    if (e.hitTimer > 0) ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.05) * 0.5;
    drawSprite(e.sprite, e.x, e.y); ctx.globalAlpha = 1;
  }
  if (boss) {
    if (boss.hitTimer > 0) ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.05) * 0.5;
    drawSprite(boss.frame === 0 ? sprFalcon1 : sprFalcon2, boss.x, boss.y); ctx.globalAlpha = 1;
  }
  if (player.invincible <= 0 || Math.floor(player.invincible * 10) % 2 === 0) {
    drawSprite(player.frame === 0 ? sprExecutor1 : sprExecutor2, player.x, player.y);
  }
  drawParticles();
  drawHUD();
  if (encourageTimer > 0) {
    ctx.globalAlpha = Math.min(1, encourageTimer);
    ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center';
    ctx.fillText(encourageText, W / 2, H / 2 - 20); ctx.globalAlpha = 1;
  }
  // Touch indicator
  if (touchActive && state === PLAYING) {
    ctx.globalAlpha = 0.15;
    ctx.strokeStyle = '#44ff44'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(touchX, touchY, 15, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function drawHUD() {
  // Larger HUD for iPad
  for (let i = 0; i < player.maxShields; i++) {
    if (i < player.shields) drawSprite(sprShieldIcon, 6 + i * 10, 5);
    else { ctx.globalAlpha = 0.2; drawSprite(sprShieldIcon, 6 + i * 10, 5); ctx.globalAlpha = 1; }
  }
  ctx.fillStyle = '#44ff44'; ctx.font = '9px monospace'; ctx.textAlign = 'left';
  ctx.fillText('W:' + player.weaponLevel, 6, 22);
  if (player.torpedoes > 0) { ctx.fillStyle = '#ffcc00'; ctx.fillText('T:' + player.torpedoes, 40, 22); }
  ctx.fillStyle = '#fff'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
  ctx.fillText('SCORE: ' + score, W / 2, 14);
  ctx.fillStyle = '#ff3333'; ctx.font = '9px monospace'; ctx.textAlign = 'right';
  ctx.fillText(missionNames[currentMission], W - 6, 14);
  if (waves && waveIndex <= waves.length && !boss) {
    ctx.fillStyle = '#888'; ctx.font = '8px monospace';
    ctx.fillText('WAVE ' + Math.min(waveIndex, waves.length) + '/' + waves.length, W - 6, 24);
  }
  if (boss && !boss.entering && !boss.defeated) {
    const barW = 140, barH = 8, barX = W/2-barW/2, barY = 24;
    ctx.fillStyle = '#333'; ctx.fillRect(barX, barY, barW, barH);
    const hpR = boss.hp / boss.maxHp;
    ctx.fillStyle = hpR > 0.5 ? '#44ff44' : (hpR > 0.25 ? '#ffcc00' : '#ff3333');
    ctx.fillRect(barX, barY, barW * hpR, barH);
    ctx.strokeStyle = '#666'; ctx.strokeRect(barX, barY, barW, barH);
    ctx.fillStyle = '#fff'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
    ctx.fillText('MILLENNIUM FALCON', W/2, barY - 2);
  }
}

function drawTitleScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 24px monospace'; ctx.textAlign = 'center';
  ctx.fillText('STAR WARS', W/2, 55);
  ctx.fillStyle = '#ff3333'; ctx.font = 'bold 18px monospace';
  ctx.fillText('EXECUTOR COMMAND', W/2, 82);
  ctx.fillStyle = '#aaa'; ctx.font = '11px monospace';
  ctx.fillText('A Space Adventure for Commander Bobo', W/2, 108);
  drawSprite(Math.floor(Date.now()/300)%2===0 ? sprExecutor1 : sprExecutor2, W/2-10, 120);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 13px monospace';
  if (Math.floor(Date.now()/500)%2) ctx.fillText('TAP TO START', W/2, 200);
  ctx.fillStyle = '#888'; ctx.font = '9px monospace';
  ctx.fillText('TOUCH AND DRAG TO MOVE', W/2, 220);
  ctx.fillText('AUTO-FIRE ENABLED', W/2, 234);
  ctx.fillStyle = '#ff3333'; ctx.font = '10px monospace';
  ctx.fillText('MISSION '+(currentMission+1)+': '+missionNames[currentMission], W/2, 255);
}

function drawLevelComplete() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 20px monospace'; ctx.textAlign = 'center';
  ctx.fillText('MISSION COMPLETE!', W/2, 80);
  ctx.fillStyle = '#fff'; ctx.font = '13px monospace';
  ctx.fillText(missionNames[currentMission], W/2, 110);
  ctx.fillStyle = '#44ff44'; ctx.font = '11px monospace';
  ctx.fillText('SCORE: '+score, W/2, 140);
  const msgs = ['MOST IMPRESSIVE, COMMANDER!','THE EMPIRE IS PROUD!','WELL DONE, BOBO!'];
  ctx.fillStyle = '#ffcc00'; ctx.font = '11px monospace';
  ctx.fillText(msgs[currentMission%msgs.length], W/2, 170);
  ctx.fillStyle = '#aaa'; ctx.font = '10px monospace';
  if (Math.floor(Date.now()/500)%2) ctx.fillText('TAP FOR NEXT MISSION', W/2, 210);
}

function drawVictory() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 22px monospace'; ctx.textAlign = 'center';
  ctx.fillText('VICTORY!', W/2, 50);
  ctx.fillStyle = '#fff'; ctx.font = '12px monospace';
  ctx.fillText('THE FALCON ESCAPES TO HYPERSPACE!', W/2, 80);
  ctx.fillText('YOU WON THE BATTLE, COMMANDER!', W/2, 100);
  drawSprite(Math.floor(Date.now()/300)%2===0 ? sprExecutor1 : sprExecutor2, W/2-10, 115);
  ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 16px monospace';
  ctx.fillText('FINAL SCORE: '+score, W/2, 170);
  ctx.fillStyle = '#44ff44'; ctx.font = '11px monospace';
  ctx.fillText('THE FORCE IS STRONG WITH YOU, BOBO!', W/2, 195);
  ctx.fillStyle = '#aaa'; ctx.font = '10px monospace';
  if (Math.floor(Date.now()/500)%2) ctx.fillText('TAP TO CONTINUE', W/2, 235);
  if (Math.random() < 0.1) spawnConfetti(Math.random()*W, 0, 3);
}

// ============================================================
// MISSION BAR
// ============================================================
const missionBtns = document.querySelectorAll('.mission-btn');
missionBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    const n = parseInt(btn.dataset.level);
    currentMission = n; score = 0; startMission(n);
  });
});

function updateMissionBar() {
  missionBtns.forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.level) === currentMission);
  });
}

// ============================================================
// GAME LOOP
// ============================================================
let lastTime = 0;
function gameLoop(time) {
  const dt = Math.min(0.05, (time - lastTime) / 1000);
  lastTime = time;
  update(dt); draw();
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

</script>
